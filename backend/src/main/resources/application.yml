spring:
  datasource:
    url: jdbc:h2:mem:rezeptdb
    driver-class-name: org.h2.Driver
    username: renu
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8081
